<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>语音识别系统</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #9aabf6 0%, #d7c5e8 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 12px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            max-width: 600px;
            width: 100%;
            padding: 40px;
        }

        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 10px;
            font-size: 28px;
        }

        .subtitle {
            text-align: center;
            color: #888;
            margin-bottom: 30px;
            font-size: 14px;
        }

        .upload-area {
            border: 2px dashed #667eea;
            border-radius: 8px;
            padding: 40px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            background-color: #f8f9ff;
            margin-bottom: 20px;
        }

        .upload-area:hover {
            background-color: #f0f2ff;
            border-color: #5600ac;
        }

        .upload-area.dragover {
            background-color: #e8ebff;
            border-color: #764ba2;
            transform: scale(1.05);
        }

        .upload-icon {
            font-size: 48px;
            margin-bottom: 15px;
        }

        .upload-text {
            color: #667eea;
            font-size: 16px;
            font-weight: 500;
            margin-bottom: 5px;
        }

        .upload-hint {
            color: #999;
            font-size: 12px;
        }

        #fileInput {
            display: none;
        }

        .file-info {
            margin-bottom: 20px;
            padding: 12px;
            background-color: #f0f2ff;
            border-radius: 6px;
            display: none;
        }

        .file-info.show {
            display: block;
        }

        .file-name {
            color: #667eea;
            font-weight: 500;
            word-break: break-all;
        }

        .btn {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-bottom: 10px;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }

        .btn-primary:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .btn-secondary {
            background-color: #e8ebff;
            color: #667eea;
        }

        .btn-secondary:hover {
            background-color: #d5dbff;
        }

        .result-area {
            margin-top: 20px;
            padding: 20px;
            background-color: #f0f2ff;
            border-radius: 8px;
            display: none;
        }

        .result-area.show {
            display: block;
        }

        .result-title {
            color: #333;
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .result-text {
            color: #333;
            font-size: 16px;
            line-height: 1.6;
            padding: 12px;
            background-color: white;
            border-radius: 6px;
            border-left: 4px solid #667eea;
        }

        .loading {
            display: none;
            text-align: center;
            padding: 20px;
        }

        .loading.show {
            display: block;
        }

        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 10px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .loading-text {
            color: #667eea;
            font-size: 14px;
        }

        .error {
            color: #d32f2f;
            padding: 12px;
            background-color: #ffebee;
            border-radius: 6px;
            margin-bottom: 10px;
            display: none;
            border-left: 4px solid #d32f2f;
        }

        .error.show {
            display: block;
        }

        .success {
            color: #388e3c;
            padding: 12px;
            background-color: #e8f5e9;
            border-radius: 6px;
            margin-bottom: 10px;
            display: none;
            border-left: 4px solid #388e3c;
        }

        .success.show {
            display: block;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎙️ 语音识别系统</h1>
        <p class="subtitle">上传音频文件进行语音识别</p>

        <div class="error" id="errorMsg"></div>
        <div class="success" id="successMsg"></div>

        <div class="upload-area" id="uploadArea">
            <div class="upload-icon">📁</div>
            <div class="upload-text">点击或拖拽上传音频文件</div>
            <div class="upload-hint">支持最大 100MB 文件</div>
            <input type="file" id="fileInput" accept=".wav,.mp3,.flac,.m4a,.ogg" />
        </div>

        <div class="file-info" id="fileInfo">
            <div class="file-name" id="fileName"></div>
        </div>

        <button class="btn btn-primary" id="recognizeBtn" disabled>
            开始识别
        </button>
        <button class="btn btn-secondary" id="clearBtn">
            清除
        </button>

        <div class="loading" id="loading">
            <div class="spinner"></div>
            <div class="loading-text">识别中，请稍候...</div>
        </div>

        <div class="result-area" id="resultArea">
            <div class="result-title">识别结果</div>
            <div class="result-text" id="resultText"></div>
        </div>
    </div>

    <script>
        const uploadArea = document.getElementById("uploadArea");
        const fileInput = document.getElementById("fileInput");
        const recognizeBtn = document.getElementById("recognizeBtn");
        const clearBtn = document.getElementById("clearBtn");
        const fileInfo = document.getElementById("fileInfo");
        const fileName = document.getElementById("fileName");
        const loading = document.getElementById("loading");
        const resultArea = document.getElementById("resultArea");
        const resultText = document.getElementById("resultText");
        const errorMsg = document.getElementById("errorMsg");
        const successMsg = document.getElementById("successMsg");

        let selectedFile = null;

        // 点击上传区域打开文件选择器
        uploadArea.addEventListener("click", () => fileInput.click());

        // 拖拽上传
        uploadArea.addEventListener("dragover", (e) => {
            e.preventDefault();
            uploadArea.classList.add("dragover");
        });

        uploadArea.addEventListener("dragleave", () => {
            uploadArea.classList.remove("dragover");
        });

        uploadArea.addEventListener("drop", (e) => {
            e.preventDefault();
            uploadArea.classList.remove("dragover");

            const files = e.dataTransfer.files;
            if (files.length > 0) {
                handleFileSelect(files[0]);
            }
        });

        // 文件选择器选择文件
        fileInput.addEventListener("change", (e) => {
            if (e.target.files.length > 0) {
                handleFileSelect(e.target.files[0]);
            }
        });

        function handleFileSelect(file) {
            // 检查文件类型
            if (!file.name.endsWith(".wav") && !file.name.endsWith(".mp3") && !file.name.endsWith(".flac") && !file.name.endsWith(".m4a") && !file.name.endsWith(".ogg")) {
                showError("只支持 .wav, .mp3, .flac, .m4a, .ogg 文件");
                return;
            }

            // 检查文件大小
            if (file.size > 100 * 1024 * 1024) {
                showError("文件大小不能超过 100MB");
                return;
            }

            selectedFile = file;
            fileName.textContent = `📄 ${file.name} (${(file.size / 1024 / 1024).toFixed(2)} MB)`;
            fileInfo.classList.add("show");
            recognizeBtn.disabled = false;
            clearError();
            clearResult();
        }

        // 识别按钮
        recognizeBtn.addEventListener("click", async () => {
            if (!selectedFile) return;

            const formData = new FormData();
            formData.append("file", selectedFile);

            recognizeBtn.disabled = true;
            loading.classList.add("show");
            clearError();
            clearResult();

            try {
                const response = await fetch("/upload", {
                    method: "POST",
                    body: formData
                });

                const data = await response.json();

                if (response.ok && data.success) {
                    resultText.textContent = data.result;
                    resultArea.classList.add("show");
                    showSuccess(`✅ 识别完成：${data.filename}`);
                } else {
                    showError(`❌ ${data.error || "识别失败"}`);
                }
            } catch (error) {
                showError(`❌ 错误：${error.message}`);
            } finally {
                loading.classList.remove("show");
                recognizeBtn.disabled = false;
            }
        });

        // 清除按钮
        clearBtn.addEventListener("click", () => {
            selectedFile = null;
            fileInput.value = "";
            fileInfo.classList.remove("show");
            recognizeBtn.disabled = true;
            clearError();
            clearResult();
        });

        function showError(message) {
            errorMsg.textContent = message;
            errorMsg.classList.add("show");
        }

        function clearError() {
            errorMsg.classList.remove("show");
        }

        function showSuccess(message) {
            successMsg.textContent = message;
            successMsg.classList.add("show");
            setTimeout(() => {
                successMsg.classList.remove("show");
            }, 3000);
        }

        function clearResult() {
            resultArea.classList.remove("show");
        }
    </script>
</body>
</html>
